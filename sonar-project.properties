# Identificacao do projeto
sonar.projectKey=biblioteca-pessoal
sonar.projectName=Biblioteca Pessoal
sonar.projectVersion=1.0.0

# Caminhos dos fontes
sonar.sources=src/main/java
sonar.tests=src/test/java

# Binarios e cobertura
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Relatorio JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Versao Java
sonar.java.source=17

# Exclusoes de analise
sonar.exclusions=*/config/*

# Exclusoes de cobertura
sonar.coverage.exclusions=*/BibliotecaPessoalApplication.java,/config/*