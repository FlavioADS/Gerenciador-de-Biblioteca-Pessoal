name: CI Spring Boot

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar, testar e gerar cobertura
        run: ./mvnw clean verify

      - name: Salvar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-jacoco
          path: target/site/jacoco/