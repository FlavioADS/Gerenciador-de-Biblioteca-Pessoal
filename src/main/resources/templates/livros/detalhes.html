<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Detalhes do livro')}"></head>
<body class="app-shell">
<div class="page-wrap">
	<div class="container-xxl">
		<div th:replace="~{fragments :: navbar('livros')}"></div>

		<section class="surface p-4 p-lg-5 reveal">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
				<div>
					<div class="badge-soft mb-2"><i class="bi bi-bookmark-check"></i> Detalhes do livro</div>
					<h1 class="section-title h3 fw-bold mb-2" th:text="${livro.titulo}">Título</h1>
					<p class="muted-text mb-0" th:text="${livro.autor}">Autor</p>
				</div>
				<div class="d-flex gap-2">
					<a th:href="@{'/livros/' + ${livro.id} + '/editar'}" class="btn btn-warning-soft">Editar</a>
					<form th:action="@{/livros/{id}/excluir(id=${livro.id})}" method="post" onsubmit="return confirm('Deseja realmente excluir este livro?');">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="btn btn-danger-soft">Excluir</button>
					</form>
					<a th:href="@{/livros}" class="btn btn-ghost">Voltar</a>
				</div>
			</div>

			<div class="row g-4">
				<div class="col-lg-4">
					<div class="book-card p-4 h-100">
						<div class="book-cover mb-3" th:if="${livro.urlCapa != null and !#strings.isEmpty(livro.urlCapa)}">
							<img th:src="${livro.urlCapa}" th:alt="|Capa do livro ${livro.titulo}|" class="book-cover-image" onerror="this.onerror=null;this.src='/img/capa-indisponivel.svg';">
						</div>
						<div class="book-cover mb-3" th:unless="${livro.urlCapa != null and !#strings.isEmpty(livro.urlCapa)}">
							<div>
								<small class="d-block mb-1">Status atual</small>
								<h2 class="h4 mb-0" th:text="${livro.statusLeitura.nomeExibicao}">Lendo</h2>
							</div>
						</div>
						<div class="d-grid gap-2">
							<div class="badge-soft justify-content-center"><i class="bi bi-calendar3"></i> <span th:text="${livro.anoPublicacao ?: 'Ano não informado'}">Ano</span></div>
							<div class="badge-soft justify-content-center"><i class="bi bi-journal-text"></i> <span th:text="${livro.numeroPaginas ?: 'Sem páginas'}">Páginas</span></div>
							<div class="badge-soft justify-content-center"><i class="bi bi-tag"></i> <span th:text="${livro.genero ?: 'Sem gênero'}">Gênero</span></div>
						</div>
					</div>
				</div>

				<div class="col-lg-8">
					<div class="info-card p-4 p-lg-5 h-100">
						<h2 class="h5 fw-bold mb-3">Sobre o livro</h2>
						<p class="muted-text" th:text="${livro.descricao ?: 'Sem descrição cadastrada.'}">Descrição</p>

						<hr class="border-secondary-subtle my-4">

						<div class="row g-3">
							<div class="col-md-6">
								<div class="card-label">Editora</div>
								<div class="fw-semibold" th:text="${livro.editora ?: 'Não informada'}">Editora</div>
							</div>
							<div class="col-md-6">
								<div class="card-label">ISBN</div>
								<div class="fw-semibold" th:text="${livro.isbn ?: 'Não informado'}">ISBN</div>
							</div>
							<div class="col-md-6">
								<div class="card-label">Capa</div>
								<div class="fw-semibold text-break" th:text="${livro.urlCapa ?: 'Sem link da capa'}">URL</div>
							</div>
							<div class="col-md-6">
								<div class="card-label">Autor da conta</div>
								<div class="fw-semibold" th:text="${livro.usuario.nome}">Usuário</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>
</div>
</body>
</html>
