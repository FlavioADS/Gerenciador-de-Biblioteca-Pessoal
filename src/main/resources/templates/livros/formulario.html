<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Livro')}"></head>
<body class="app-shell">
<div class="page-wrap">
	<div class="container-xxl">
		<div th:replace="~{fragments :: navbar('livros')}"></div>

		<section class="surface p-4 p-lg-5 reveal">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
				<div>
					<h1 class="section-title h3 fw-bold mb-2" th:text="${livro.id} != null ? 'Editar livro' : 'Cadastrar livro'">Cadastrar livro</h1>
					<p class="muted-text mb-0">Preencha os dados principais para organizar sua leitura.</p>
				</div>
				<a th:href="@{/livros}" class="btn btn-ghost">Voltar para lista</a>
			</div>

			<form th:action="@{/livros}" th:unless="${livro.id != null}" th:object="${livro}" method="post" class="row g-3">
				<div class="col-lg-8">
					<label class="form-label fw-semibold" for="titulo">Título<span class="required-mark">*</span></label>
					<input id="titulo" th:field="*{titulo}" class="form-control" placeholder="Nome do livro" required>
				</div>
				<div class="col-lg-4">
					<label class="form-label fw-semibold" for="autor">Autor<span class="required-mark">*</span></label>
					<input id="autor" th:field="*{autor}" class="form-control" placeholder="Nome do autor" required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold" for="isbn">ISBN</label>
					<input id="isbn" th:field="*{isbn}" class="form-control" placeholder="978...">
				</div>
				<div class="col-md-6">
					<label class="form-label fw-semibold" for="editora">Editora</label>
					<input id="editora" th:field="*{editora}" class="form-control" placeholder="Editora">
				</div>

				<div class="col-md-4">
					<label class="form-label fw-semibold" for="anoPublicacao">Ano de publicação</label>
					<input id="anoPublicacao" th:field="*{anoPublicacao}" type="number" class="form-control" placeholder="2026">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="genero">Gênero</label>
					<input id="genero" th:field="*{genero}" class="form-control" placeholder="Ficção, drama...">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="numeroPaginas">Páginas</label>
					<input id="numeroPaginas" th:field="*{numeroPaginas}" type="number" class="form-control" placeholder="320">
				</div>

				<div class="col-md-8">
					<label class="form-label fw-semibold" for="urlCapa">URL da capa</label>
					<input id="urlCapa" th:field="*{urlCapa}" class="form-control" placeholder="https://...">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="statusLeitura">Status</label>
					<select id="statusLeitura" th:field="*{statusLeitura}" class="form-select">
						<option th:each="status : ${statusLeituras}" th:value="${status}" th:text="${status.nomeExibicao}"></option>
					</select>
				</div>

				<div class="col-12">
					<label class="form-label fw-semibold" for="descricao">Descrição</label>
					<textarea id="descricao" th:field="*{descricao}" rows="5" class="form-control" placeholder="Resumo, observações ou trechos importantes"></textarea>
				</div>

				<div class="col-12 d-flex flex-wrap gap-2 mt-2">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit" class="btn btn-primary px-4">Salvar livro</button>
					<a th:href="@{/livros}" class="btn btn-ghost px-4">Cancelar</a>
				</div>
			</form>

			<form th:action="@{/livros/{id}(id=${livro.id})}" th:if="${livro.id != null}" th:object="${livro}" method="post" class="row g-3">
				<div class="col-lg-8">
					<label class="form-label fw-semibold" for="titulo-editar">Título<span class="required-mark">*</span></label>
					<input id="titulo-editar" th:field="*{titulo}" class="form-control" placeholder="Nome do livro" required>
				</div>
				<div class="col-lg-4">
					<label class="form-label fw-semibold" for="autor-editar">Autor<span class="required-mark">*</span></label>
					<input id="autor-editar" th:field="*{autor}" class="form-control" placeholder="Nome do autor" required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold" for="isbn-editar">ISBN</label>
					<input id="isbn-editar" th:field="*{isbn}" class="form-control" placeholder="978...">
				</div>
				<div class="col-md-6">
					<label class="form-label fw-semibold" for="editora-editar">Editora</label>
					<input id="editora-editar" th:field="*{editora}" class="form-control" placeholder="Editora">
				</div>

				<div class="col-md-4">
					<label class="form-label fw-semibold" for="anoPublicacao-editar">Ano de publicação</label>
					<input id="anoPublicacao-editar" th:field="*{anoPublicacao}" type="number" class="form-control" placeholder="2026">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="genero-editar">Gênero</label>
					<input id="genero-editar" th:field="*{genero}" class="form-control" placeholder="Ficção, drama...">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="numeroPaginas-editar">Páginas</label>
					<input id="numeroPaginas-editar" th:field="*{numeroPaginas}" type="number" class="form-control" placeholder="320">
				</div>

				<div class="col-md-8">
					<label class="form-label fw-semibold" for="urlCapa-editar">URL da capa</label>
					<input id="urlCapa-editar" th:field="*{urlCapa}" class="form-control" placeholder="https://...">
				</div>
				<div class="col-md-4">
					<label class="form-label fw-semibold" for="statusLeitura-editar">Status</label>
					<select id="statusLeitura-editar" th:field="*{statusLeitura}" class="form-select">
						<option th:each="status : ${statusLeituras}" th:value="${status}" th:text="${status.nomeExibicao}"></option>
					</select>
				</div>

				<div class="col-12">
					<label class="form-label fw-semibold" for="descricao-editar">Descrição</label>
					<textarea id="descricao-editar" th:field="*{descricao}" rows="5" class="form-control" placeholder="Resumo, observações ou trechos importantes"></textarea>
				</div>

				<div class="col-12 d-flex flex-wrap gap-2 mt-2">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit" class="btn btn-primary px-4">Salvar livro</button>
					<a th:href="@{/livros}" class="btn btn-ghost px-4">Cancelar</a>
				</div>
			</form>
		</section>
	</div>
</div>
</body>
</html>
