<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<title>Livros - Biblioteca Pessoal</title>
	<th:block th:replace="~{fragments :: styles}"></th:block>
</head>
<body class="app-shell">
<div class="page-wrap">
	<div class="container-xxl">
		<div th:replace="~{fragments :: navbar('livros')}"></div>

		<section class="surface p-4 p-lg-5 reveal mb-4">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
				<div>
					<h1 class="section-title h3 fw-bold mb-2">Sua biblioteca</h1>
					<p class="muted-text mb-0">Cadastre, acompanhe e organize seus livros em um só lugar.</p>
				</div>
				<a th:href="@{/livros/novo}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Novo livro</a>
			</div>
		</section>

		<div th:if="${mensagemSucesso}" class="alert alert-success alert-glass border-0 reveal" th:text="${mensagemSucesso}"></div>

		<section th:if="${#lists.isEmpty(livros)}" class="surface p-5 text-center reveal">
			<div class="mx-auto" style="max-width: 560px;">
				<div class="avatar-chip mx-auto mb-3"><i class="bi bi-journal-plus"></i></div>
				<h2 class="h4 fw-bold mb-2">Sua estante está vazia</h2>
				<p class="muted-text mb-4">Adicione o primeiro livro para começar a acompanhar leitura, status e progresso.</p>
				<a th:href="@{/livros/novo}" class="btn btn-primary">Adicionar primeiro livro</a>
			</div>
		</section>

		<section class="row g-3" th:unless="${#lists.isEmpty(livros)}">
			<div class="col-md-6 col-xl-4" th:each="livro : ${livros}">
				<article class="book-card h-100 p-4">
					<div class="book-cover mb-3" th:if="${livro.urlCapa != null and !#strings.isEmpty(livro.urlCapa)}">
						<img th:src="${livro.urlCapa}" th:alt="|Capa do livro ${livro.titulo}|" class="book-cover-image" th:data-fallback="@{/img/capa-indisponivel.svg}">
					</div>
					<div class="book-cover mb-3" th:unless="${livro.urlCapa != null and !#strings.isEmpty(livro.urlCapa)}">
						<div>
							<small class="d-block mb-1" th:text="${livro.statusLeitura.nomeExibicao}">Não Iniciado</small>
							<h3 class="h5 mb-0" th:text="${livro.titulo}">Título</h3>
						</div>
					</div>
					<div class="d-flex justify-content-between align-items-start gap-2 mb-2">
						<div>
							<h3 class="h5 fw-bold mb-1" th:text="${livro.autor}">Autor</h3>
							<div class="small-muted" th:text="${livro.editora ?: 'Editora não informada'}">Editora</div>
						</div>
						<span class="badge-soft" th:text="${livro.genero ?: 'Sem gênero'}">Gênero</span>
					</div>
					<p class="muted-text mb-3 text-truncate-3" th:text="${livro.descricao ?: 'Sem descrição.'}">Descrição</p>
					<div class="book-actions">
						<a th:href="@{/livros/{id}(id=${livro.id})}" class="btn btn-sm btn-ghost action-btn"><i class="bi bi-eye me-1"></i>Ver</a>
						<a th:href="@{/livros/{id}/editar(id=${livro.id})}" class="btn btn-sm btn-warning-soft action-btn"><i class="bi bi-pencil me-1"></i>Editar</a>
						<form th:action="@{/livros/{id}/excluir(id=${livro.id})}" method="post" onsubmit="return confirm('Deseja realmente excluir este livro?');">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<button class="btn btn-sm btn-danger-soft action-btn" type="submit"><i class="bi bi-trash me-1"></i>Excluir</button>
						</form>
						<form th:action="@{/livros/{id}/status(id=${livro.id})}" method="post" class="d-flex gap-2 flex-grow-1 status-form">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<select name="statusLeitura" class="form-select form-select-sm status-select" onchange="this.form.submit()" aria-label="Alterar status de leitura">
								<option th:each="status : ${statusLeituras}" th:value="${status}" th:text="${status.nomeExibicao}" th:selected="${status == livro.statusLeitura}"></option>
							</select>
						</form>
					</div>
				</article>
			</div>
		</section>
	</div>
</div>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
