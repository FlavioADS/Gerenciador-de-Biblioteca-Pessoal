<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Biblioteca Pessoal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark nav-glass rounded-4 px-3 px-lg-4 py-3 mb-4 reveal">
    <div class="container-fluid p-0">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" th:href="@{/painel}">
            <span class="brand-mark"><i class="bi bi-book-half"></i></span>
            Biblioteca Pessoal
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Alternar navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active} == 'painel' ? ' active fw-semibold' : ''" th:href="@{/painel}">Painel</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active} == 'livros' ? ' active fw-semibold' : ''" th:href="@{/livros}">Livros</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active} == 'perfil' ? ' active fw-semibold' : ''" th:href="@{/perfil}">Perfil</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <span class="badge-soft">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-ghost btn-sm px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
<script th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</script>
</html>
