<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Editar perfil')}"></head>
<body class="app-shell">
<div class="page-wrap">
	<div class="container-xxl">
		<div th:replace="~{fragments :: navbar('perfil')}"></div>

		<section class="surface p-4 p-lg-5 reveal">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
				<div>
					<div class="badge-soft mb-2"><i class="bi bi-gear"></i> Configurações do usuário</div>
					<h1 class="section-title h3 fw-bold mb-2">Editar perfil</h1>
					<p class="muted-text mb-0">Atualize nome e email, mantendo a conta sincronizada.</p>
				</div>
				<a th:href="@{/perfil}" class="btn btn-ghost">Voltar</a>
			</div>

			<form th:action="@{/perfil/editar}" method="post" class="row g-3">
				<div class="col-md-6">
					<label for="nome" class="form-label fw-semibold">Nome</label>
					<input id="nome" name="nome" type="text" class="form-control" th:value="${usuario.nome}" required>
				</div>
				<div class="col-md-6">
					<label for="email" class="form-label fw-semibold">Email</label>
					<input id="email" name="email" type="email" class="form-control" th:value="${usuario.email}" required>
				</div>
				<div class="col-12 d-flex flex-wrap gap-2 mt-2">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit" class="btn btn-primary px-4">Salvar alterações</button>
					<a th:href="@{/perfil/senha}" class="btn btn-ghost px-4">Alterar senha</a>
				</div>
			</form>
		</section>
	</div>
</div>
</body>
</html>
