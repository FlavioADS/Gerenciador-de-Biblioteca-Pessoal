spring.application.name=gerenciador-biblioteca-pessoal

spring.datasource.url=jdbc:mysql://localhost:3307/biblioteca_pessoal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=biblioteca
spring.datasource.password=${BIBLIOTECA_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.thymeleaf.cache=false